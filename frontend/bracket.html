<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFA World Cup 2026 Bracket Builder</title>
  <meta name="description" content="Build your 2026 FIFA World Cup knockout bracket. Pick winners and predict the champion!">
  <link rel="stylesheet" href="index.css">
  <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
</head>
<body>

  <div class="app-container">
    <header>
      <a href="index.html" class="logo-container">
        <span class="logo-emoji">🏆</span>
        <span class="logo-text">FIFA2026<span>Bracket</span></span>
      </a>
      <a href="leaderboard.html" class="btn btn-secondary">Leaderboard</a>
      <a href="matchups.html" class="btn btn-secondary">Today's Matches</a>
    </header>

    <main class="bracket-wrapper">
      <div class="instructions-alert" id="instructionMessage">
        <span>💡</span>
        <span>All Round of 32 matchups are set! Click a team to pick the winner — your pick cascades through the bracket automatically.</span>
      </div>

      <div class="bracket-meta">
        <div class="meta-info-text">
          <p>Status: <strong id="bracketProgressText">0/32 picks completed</strong></p>
        </div>
        <div class="name-input-group">
          <input type="text" id="userNameInput" class="name-input" placeholder="Enter your display name" maxlength="30">
          <button id="submitBracketBtn" class="btn btn-primary">Submit Bracket</button>
        </div>
      </div>

      <div class="bracket-container" id="bracketContainer">
        <div class="bracket-round" id="round-r32"></div>
        <div class="bracket-round" id="round-r16"></div>
        <div class="bracket-round" id="round-qf"></div>
        <div class="bracket-round" id="round-sf"></div>
        <div class="bracket-round" id="round-final"></div>
        <div class="bracket-round" id="round-champion">
          <div class="champion-wrapper">
            <div class="champion-title-text">Champion</div>
            <div class="champion-card empty" id="championCard">
              <div class="champion-badge">Winner</div>
              <div class="empty-state-icon" style="font-size:2rem;margin-bottom:0px;">🏆</div>
              <span id="championName">TBD</span>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div class="tooltip-container" id="teamTooltip"></div>
    <div class="toast" id="toastMessage">Bracket Saved!</div>
  </div>

  <script>
    const API_BASE = "https://fifabracket-api.jason-greathouse.workers.dev";

    // Twemoji flag rendering
    function getFlagEmoji(teamId) {
      if (!teamId) return '🏳️';
      const code = teamId.toUpperCase();
      if (code === 'SCO') return '🏴󠁧󠁢󠁳󠁣󠁴󠁿';
      if (code === 'ENG') return '<img src="images/england.png" style="width:4rem;height:3rem;object-fit:cover;border-radius:2px;" alt="England">';
      const isoMap = {
        CZE:'CZ', KOR:'KR', MEX:'MX', RSA:'ZA', BIH:'BA', CAN:'CA', QAT:'QA', SUI:'CH',
        BRA:'BR', HAI:'HT', MAR:'MA', AUS:'AU', PAR:'PY', TUR:'TR', USA:'US', CIV:'CI',
        CUW:'CW', ECU:'EC', GER:'DE', JPN:'JP', NED:'NL', SWE:'SE', TUN:'TN', BEL:'BE',
        EGY:'EG', IRN:'IR', NZL:'NZ', CPV:'CV', ESP:'ES', KSA:'SA', URU:'UY', FRA:'FR',
        IRQ:'IQ', NOR:'NO', SEN:'SN', ALG:'DZ', ARG:'AR', AUT:'AT', JOR:'JO', COD:'CD',
        COL:'CO', POR:'PT', UZB:'UZ', CRO:'HR', GHA:'GH', PAN:'PA'
      };
      const iso = isoMap[code];
      if (!iso) return '🏳️';
      return iso.split('').map(c => String.fromCodePoint(c.charCodeAt(0) + 127397)).join('');
    }

    // Hardcoded R32 matchups — confirmed + TBD
    const R32_MATCHES = [
      { id:'m1',  team1:'GER', team2:'PAR' },
      { id:'m2',  team1:'FRA', team2:'SWE' },
      { id:'m3',  team1:'RSA', team2:'CAN' },
      { id:'m4',  team1:'NED', team2:'MAR' },
      { id:'m5',  team1:'TBD', team2:'CRO' },
      { id:'m6',  team1:'ESP', team2:'TBD' },
      { id:'m7',  team1:'USA', team2:'BIH' },
      { id:'m8',  team1:'BEL', team2:'TBD' },
      { id:'m9',  team1:'BRA', team2:'JPN' },
      { id:'m10', team1:'CIV', team2:'NOR' },
      { id:'m11', team1:'MEX', team2:'TBD' },
      { id:'m12', team1:'ENG', team2:'TBD' },
      { id:'m13', team1:'ARG', team2:'CPV' },
      { id:'m14', team1:'AUS', team2:'EGY' },
      { id:'m15', team1:'SUI', team2:'TBD' },
      { id:'m16', team1:'TBD', team2:'GHA' },
    ];

    const TEAM_INFO = {
      CZE:{rank:35,odds:"+15000"}, KOR:{rank:22,odds:"+8000"}, MEX:{rank:15,odds:"+5000"},
      RSA:{rank:59,odds:"+20000"}, BIH:{rank:74,odds:"+30000"}, CAN:{rank:40,odds:"+8000"},
      QAT:{rank:34,odds:"+25000"}, SUI:{rank:19,odds:"+5000"}, BRA:{rank:5,odds:"+550"},
      HAI:{rank:86,odds:"+50000"}, MAR:{rank:13,odds:"+2500"}, SCO:{rank:39,odds:"+20000"},
      AUS:{rank:24,odds:"+10000"}, PAR:{rank:56,odds:"+15000"}, TUR:{rank:26,odds:"+8000"},
      USA:{rank:16,odds:"+3300"}, CIV:{rank:30,odds:"+8000"}, CUW:{rank:90,odds:"+75000"},
      ECU:{rank:29,odds:"+6600"}, GER:{rank:8,odds:"+900"}, JPN:{rank:18,odds:"+4000"},
      NED:{rank:7,odds:"+1400"}, SWE:{rank:25,odds:"+8000"}, TUN:{rank:41,odds:"+20000"},
      BEL:{rank:10,odds:"+1600"}, EGY:{rank:36,odds:"+15000"}, IRN:{rank:20,odds:"+8000"},
      NZL:{rank:104,odds:"+50000"}, CPV:{rank:65,odds:"+30000"}, ESP:{rank:3,odds:"+500"},
      KSA:{rank:53,odds:"+25000"}, URU:{rank:11,odds:"+1200"}, FRA:{rank:2,odds:"+450"},
      IRQ:{rank:58,odds:"+25000"}, NOR:{rank:44,odds:"+10000"}, SEN:{rank:21,odds:"+6600"},
      ALG:{rank:37,odds:"+12000"}, ARG:{rank:1,odds:"+400"}, AUT:{rank:23,odds:"+6600"},
      JOR:{rank:71,odds:"+40000"}, COD:{rank:62,odds:"+25000"}, COL:{rank:9,odds:"+1600"},
      POR:{rank:6,odds:"+750"}, UZB:{rank:66,odds:"+40000"}, CRO:{rank:12,odds:"+2500"},
      ENG:{rank:4,odds:"+600"}, GHA:{rank:64,odds:"+15000"}, PAN:{rank:85,odds:"+25000"}
    };

    let allTeams = [];
    const bracketState = { r32:{}, r16:{}, qf:{}, sf:{}, final:{} };
    const picks = { r32:{}, r16:{}, qf:{}, sf:{}, final:{}, champion:null };

    function initStructures() {
      for (let i=1;i<=16;i++) { bracketState.r32["match"+i]={team1:null,team2:null}; picks.r32["match"+i]=null; }
      for (let i=1;i<=8;i++) { bracketState.r16["match"+i]={team1:null,team2:null}; picks.r16["match"+i]=null; }
      for (let i=1;i<=4;i++) { bracketState.qf["match"+i]={team1:null,team2:null}; picks.qf["match"+i]=null; }
      for (let i=1;i<=2;i++) { bracketState.sf["match"+i]={team1:null,team2:null}; picks.sf["match"+i]=null; }
      bracketState.final.match1={team1:null,team2:null};
      picks.final.match1=null;
      picks.champion=null;
    }

    async function loadTeams() {
      try {
        const res = await fetch(`${API_BASE}/teams`);
        if (!res.ok) throw new Error("Failed to fetch teams");
        allTeams = await res.json();

        // Pre-load R32 matchups from hardcoded list
        R32_MATCHES.forEach((match, idx) => {
          const matchNum = idx + 1;
          bracketState.r32["match"+matchNum] = {
            team1: match.team1 === 'TBD' ? null : match.team1,
            team2: match.team2 === 'TBD' ? null : match.team2,
            isTBD: match.team1 === 'TBD' || match.team2 === 'TBD'
          };
        });

        renderBracket();
        twemoji.parse(document.body);
      } catch(err) {
        console.error(err);
        showToast("Error loading teams. Please refresh.", true);
      }
    }

    function getTeam(teamId) { return allTeams.find(t => t.id === teamId) || null; }

    function clearWinnerAndCascade(round, matchNum) {
      picks[round]["match"+matchNum] = null;
      let childRound=null, childMatchNum=null, childSlot=null;
      if (round==='r32') { childRound='r16'; childMatchNum=Math.floor((matchNum-1)/2)+1; childSlot=(matchNum%2!==0)?'team1':'team2'; }
      else if (round==='r16') { childRound='qf'; childMatchNum=Math.floor((matchNum-1)/2)+1; childSlot=(matchNum%2!==0)?'team1':'team2'; }
      else if (round==='qf') { childRound='sf'; childMatchNum=Math.floor((matchNum-1)/2)+1; childSlot=(matchNum%2!==0)?'team1':'team2'; }
      else if (round==='sf') { childRound='final'; childMatchNum=1; childSlot=(matchNum===1)?'team1':'team2'; }
      else if (round==='final') {
        picks.champion=null;
        const cc=document.getElementById("championCard");
        cc.classList.add("empty");
        document.getElementById("championName").innerText="TBD";
        return;
      }
      if (childRound) {
        bracketState[childRound]["match"+childMatchNum][childSlot]=null;
        clearWinnerAndCascade(childRound, childMatchNum);
      }
    }

    function setMatchWinner(round, matchNum, teamId) {
      picks[round]["match"+matchNum] = teamId;
      let childRound=null, childMatchNum=null, childSlot=null;
      if (round==='r32') { childRound='r16'; childMatchNum=Math.floor((matchNum-1)/2)+1; childSlot=(matchNum%2!==0)?'team1':'team2'; }
      else if (round==='r16') { childRound='qf'; childMatchNum=Math.floor((matchNum-1)/2)+1; childSlot=(matchNum%2!==0)?'team1':'team2'; }
      else if (round==='qf') { childRound='sf'; childMatchNum=Math.floor((matchNum-1)/2)+1; childSlot=(matchNum%2!==0)?'team1':'team2'; }
      else if (round==='sf') { childRound='final'; childMatchNum=1; childSlot=(matchNum===1)?'team1':'team2'; }
      else if (round==='final') {
        picks.champion=teamId;
        const cc=document.getElementById("championCard");
        const t=getTeam(teamId);
        if (t) {
          cc.classList.remove("empty");
          document.getElementById("championName").innerHTML=`<span class="team-flag">${getFlagEmoji(t.id)}</span> <span class="team-name">${t.name}</span>`;
          twemoji.parse(cc);
        }
        updateProgress(); renderBracket(); return;
      }
      if (childRound) {
        const old=bracketState[childRound]["match"+childMatchNum][childSlot];
        bracketState[childRound]["match"+childMatchNum][childSlot]=teamId;
        if (old!==teamId) clearWinnerAndCascade(childRound, childMatchNum);
      }
      updateProgress(); renderBracket();
      twemoji.parse(document.body);
    }

    function updateProgress() {
      let count=0;
      for (let k in picks.r32) if (picks.r32[k]) count++;
      for (let k in picks.r16) if (picks.r16[k]) count++;
      for (let k in picks.qf) if (picks.qf[k]) count++;
      for (let k in picks.sf) if (picks.sf[k]) count++;
      if (picks.final.match1) count++;
      if (picks.champion) count++;
      document.getElementById("bracketProgressText").innerText=`${count}/32 picks completed`;
    }

    function renderSlotHtml(round, matchNum, slot, teamId, isWinnerSelected, isTBD) {
      if (!teamId) {
        return `<div class="match-slot empty">
          <span>${isTBD ? '⏳ TBD' : 'TBD'}</span>
        </div>`;
      }
      const team = getTeam(teamId);
      if (!team) return "";
      const winnerClass = isWinnerSelected ? "selected-winner" : "";
      const hasBothTeams = bracketState[round]["match"+matchNum].team1 && bracketState[round]["match"+matchNum].team2;
      let clickHandler = "";
      if (hasBothTeams) clickHandler = `onclick="selectWinnerClick('${round}',${matchNum},'${teamId}')"`;
      const infoBtnHtml = `<button class="slot-info-btn" onclick="event.stopPropagation();showTeamTooltip(event,'${teamId}')" title="View Team Stats">ℹ️</button>`;
      return `
        <div class="match-slot ${winnerClass}" ${clickHandler} style="${hasBothTeams?'cursor:pointer':''}">
          <div class="team-display">
            <span class="team-flag">${getFlagEmoji(team.id)}</span>
            <span class="team-name">${team.name}</span>
          </div>
          <div style="display:flex;gap:0.25rem;align-items:center;">${infoBtnHtml}</div>
        </div>`;
    }

    function selectWinnerClick(round, matchNum, teamId) { setMatchWinner(round, matchNum, teamId); }

    function renderRound(roundName, matchCount) {
      const container = document.getElementById(`round-${roundName}`);
      container.innerHTML = "";
      for (let i=1;i<=matchCount;i++) {
        const match = bracketState[roundName]["match"+i];
        const winner = picks[roundName]["match"+i];
        const card = document.createElement("div");
        card.className = "match-card";
        const hasBothTeams = match.team1 && match.team2;
        const isTBD = match.isTBD || (!match.team1 && !match.team2 && roundName === 'r32');
        let subTitle = "";
        if (roundName === 'r32') subTitle = hasBothTeams ? "Pick Winner" : "⏳ Coming Soon";
        else subTitle = hasBothTeams ? "Pick Winner" : "Awaiting picks";
        card.innerHTML = `
          <div class="match-header">
            <span>Match ${i}</span>
            <span style="color:${hasBothTeams?'var(--accent-green)':'var(--text-secondary)'}">${subTitle}</span>
          </div>
          ${renderSlotHtml(roundName,i,"team1",match.team1,winner&&winner===match.team1,isTBD)}
          ${renderSlotHtml(roundName,i,"team2",match.team2,winner&&winner===match.team2,isTBD)}`;
        container.appendChild(card);
      }
    }

    function renderBracket() {
      renderRound("r32",16); renderRound("r16",8); renderRound("qf",4); renderRound("sf",2); renderRound("final",1);
      const cc = document.getElementById("championCard");
      if (picks.champion) {
        const team = getTeam(picks.champion);
        if (team) {
          cc.classList.remove("empty");
          document.getElementById("championName").innerHTML=`
            <span class="team-flag" style="font-size:2rem;display:block;margin-bottom:0.25rem;">${getFlagEmoji(team.id)}</span>
            <span class="team-name" style="font-weight:800;font-size:1.1rem;">${team.name}</span>`;
          cc.onclick = () => showTeamTooltip(event, team.id);
          twemoji.parse(cc);
        }
      } else {
        cc.classList.add("empty");
        document.getElementById("championName").innerText="TBD";
        cc.onclick = null;
      }
    }

    function showTeamTooltip(e, teamId) {
      const tooltip = document.getElementById("teamTooltip");
      const team = getTeam(teamId);
      if (!team) return;
      const info = TEAM_INFO[teamId]||{rank:"N/A",odds:"N/A"};
      tooltip.innerHTML=`
        <div class="tooltip-title"><span>${getFlagEmoji(team.id)}</span><span>${team.name}</span></div>
        <div class="tooltip-row"><span>FIFA Rank:</span><strong>#${info.rank}</strong></div>
        <div class="tooltip-row"><span>Odds:</span><strong>${info.odds}</strong></div>
        <div class="tooltip-row"><span>Group:</span><strong>Group ${team.group_letter}</strong></div>`;
      twemoji.parse(tooltip);
      const rect = e.currentTarget.getBoundingClientRect();
      tooltip.style.left=`${Math.min(window.innerWidth-240,Math.max(10,rect.left+window.scrollX-100))}px`;
      tooltip.style.top=`${rect.top+window.scrollY-100}px`;
      tooltip.classList.add("active");
      setTimeout(()=>{ document.addEventListener("click",()=>tooltip.classList.remove("active"),{once:true}); },50);
    }

    function showToast(msg, isError=false) {
      const toast = document.getElementById("toastMessage");
      toast.innerText=msg;
      toast.style.background=isError?"var(--accent-red)":"var(--accent-green)";
      toast.style.color=isError?"#ffffff":"#040805";
      toast.classList.add("show");
      setTimeout(()=>toast.classList.remove("show"),3000);
    }

    async function submitBracket() {
      const nameInput = document.getElementById("userNameInput");
      const name = nameInput.value.trim();
      if (!name) { showToast("Please enter a display name first",true); nameInput.focus(); return; }
      if (!picks.champion) { showToast("Please complete your bracket before submitting!",true); return; }

      // Store R32 slots for reconstruction in view.html
      picks.r32_slots = {};
      for (let m in bracketState.r32) {
        picks.r32_slots[m] = { team1:bracketState.r32[m].team1, team2:bracketState.r32[m].team2 };
      }

      const submitBtn = document.getElementById("submitBracketBtn");
      submitBtn.disabled=true; submitBtn.innerText="Submitting...";

      try {
        const res = await fetch(`${API_BASE}/bracket`, {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({name, picks})
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error||"Failed to submit");
        }
        const data = await res.json();
        showToast("Bracket submitted! Redirecting...");
        setTimeout(()=>{ window.location.href=`view.html?id=${data.id}`; },1000);
      } catch(err) {
        console.error(err);
        showToast(err.message||"Submission failed. Try again.",true);
        submitBtn.disabled=false; submitBtn.innerText="Submit Bracket";
      }
    }

    document.getElementById("submitBracketBtn").addEventListener("click", submitBracket);
    initStructures();
    loadTeams();
  </script>
</body>
</html>
